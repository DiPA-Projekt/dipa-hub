server:
  port: 9080
  use-forward-headers: true
  tomcat:
    internal-proxies: 139\.174\.11\.9|127\.\d{1,3}\.\d{1,3}\.\d{1,3}

spring:
  banner:
    location: classpath:dipa-banner.txt
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

keycloak:
  auth-server-url: https://auth.dipa.online/auth
  realm: DiPA
  resource: dipa-app
  public-client: true
  principal-attribute: preferred_username
  bearer-only: true

dipa:
  tenants:
    dataSources:
      - tenantId: itzbund
        url: jdbc:postgresql://localhost:5432/dipa-itzbund
        platform: postgresql
        username: dipa
        password: secret-pwd
      - tenantId: ba
        url: jdbc:postgresql://localhost:5433/dipa-ba
        platform: postgresql
        username: dipa
        password: secret-pwd

logging:
  file:
    name: "./logs/dipa-logfile.log"
#  level:
#    org.springframework.security: DEBUG
#    org.keycloak: DEBUG


management:
  endpoint:
    loggers:
      enabled: true
    logfile:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "info,health,loggers,logfile"

